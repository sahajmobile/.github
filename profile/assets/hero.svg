<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep night gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0b1d3a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Neon brand gradient -->
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Aurora blob -->
    <radialGradient id="aurora1" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="0.7" cy="0.7" r="0.7">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="480" fill="url(#bg)"/>

  <!-- Animated aurora blobs -->
  <circle cx="320" cy="180" r="380" fill="url(#aurora1)">
    <animate attributeName="cx" values="320;1280;320" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="180;320;180" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1280" cy="320" r="420" fill="url(#aurora2)">
    <animate attributeName="cx" values="1280;320;1280" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="320;180;320" dur="13s" repeatCount="indefinite"/>
  </circle>

  <!-- Grid floor -->
  <g stroke="#0ea5e9" stroke-opacity="0.12" stroke-width="1">
    <line x1="0" y1="380" x2="1600" y2="380"/>
    <line x1="0" y1="410" x2="1600" y2="410"/>
    <line x1="0" y1="440" x2="1600" y2="440"/>
    <line x1="0" y1="470" x2="1600" y2="470"/>
  </g>
  <g stroke="#6366f1" stroke-opacity="0.10" stroke-width="1">
    <line x1="100"  y1="360" x2="-200" y2="480"/>
    <line x1="300"  y1="360" x2="200"  y2="480"/>
    <line x1="500"  y1="360" x2="500"  y2="480"/>
    <line x1="700"  y1="360" x2="750"  y2="480"/>
    <line x1="900"  y1="360" x2="900"  y2="480"/>
    <line x1="1100" y1="360" x2="1150" y2="480"/>
    <line x1="1300" y1="360" x2="1450" y2="480"/>
    <line x1="1500" y1="360" x2="1800" y2="480"/>
  </g>

  <!-- Twinkling stars -->
  <g fill="#ffffff">
    <circle cx="120"  cy="80"  r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="260"  cy="140" r="1.0"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="440"  cy="60"  r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="640"  cy="110" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="820"  cy="40"  r="1.0"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="120" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1220" cy="70"  r="1.2"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="1380" cy="150" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1500" cy="90"  r="1.0"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Brand mark: glowing ring + S -->
  <g transform="translate(800,210)">
    <circle r="92" fill="none" stroke="url(#neon)" stroke-width="3" opacity="0.45" filter="url(#bigglow)">
      <animate attributeName="r" values="92;100;92" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="76" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.85" filter="url(#glow)"/>
    <circle r="62" fill="#020617" stroke="url(#neon)" stroke-width="1.5"/>
    <text x="0" y="22" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="url(#neon)" filter="url(#glow)">S</text>
  </g>

  <!-- Wordmark -->
  <text x="800" y="360" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="14" fill="#ffffff" filter="url(#glow)">SAHAJ MOBILE</text>

  <!-- Tagline -->
  <text x="800" y="408" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" letter-spacing="6" fill="#7dd3fc" opacity="0.85">PREMIUM   ·   MOBILE-FIRST   ·   BUILT  TO  SHIP</text>

  <!-- Side accent lines -->
  <line x1="180" y1="240" x2="320" y2="240" stroke="url(#neon)" stroke-width="2" opacity="0.6"/>
  <line x1="1280" y1="240" x2="1420" y2="240" stroke="url(#neon)" stroke-width="2" opacity="0.6"/>
</svg>
